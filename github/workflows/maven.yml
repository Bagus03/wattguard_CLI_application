name: Java CI

on:
  push:
    branches: [ "branchHandi" ]

pull_request:
    branches: [ "branchHandi" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build
      run: mvn clean install

    - name: Run Testing
      run: mvn test